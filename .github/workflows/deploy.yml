name: Deploy TelcoCRM

on:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - name: Create dist folder
        run: mkdir -p dist
      - name: Inject credentials
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON: ${{ secrets.SUPABASE_ANON }}
        run: |
          python3 -c "
          with open('index.html', 'r') as f:
              content = f.read()
          import os
          content = content.replace('__SUPABASE_URL__', os.environ['SUPABASE_URL'])
          content = content.replace('__SUPABASE_ANON__', os.environ['SUPABASE_ANON'])
          with open('dist/index.html', 'w') as f:
              f.write(content)
          print('Done')
          "
        
      - name: Verify injection
        run: grep -c "supabase.co" dist/index.html && echo "Injection OK" || echo "Injection FAILED"

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          force_orphan: true
